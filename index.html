<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Provider Network Map</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <aside id="sidebar">
    <h2>Provider Network</h2>
    <p id="summaryText"></p>
    <div class="manual-actions">
      <button id="addCategoryButton" type="button" title="Add category">
        <span aria-hidden="true">+</span> Category
      </button>
      <button id="addProviderButton" type="button" title="Add provider">
        <span aria-hidden="true">+</span> Provider
      </button>
    </div>
    <div id="categoryFilters" class="filter-buttons category-buttons"></div>
    <div class="filter-buttons">
      <button id="filterAll" class="active">All</button>
      <button id="filterSigned">Signed</button>
      <button id="filterPending">Pending</button>
    </div>
    <div class="search-box">
      <input type="search" id="searchInput" placeholder="Search provider or location..." />
    </div>
    <ul id="providerList" class="provider-list"></ul>
  </aside>
  <div id="map"></div>
  <div id="manualModal" class="modal-backdrop" hidden>
    <form id="manualForm" class="modal-panel" novalidate>
      <div class="modal-header">
        <h3 id="modalTitle"></h3>
        <button class="modal-close" type="button" aria-label="Close">&times;</button>
      </div>
      <div id="modalFields" class="modal-fields"></div>
      <p id="modalError" class="modal-error" role="alert"></p>
      <div class="modal-actions">
        <button type="button" class="secondary-action" id="modalCancel">Cancel</button>
        <button type="submit" class="primary-action" id="modalSubmit">Save</button>
      </div>
    </form>
  </div>
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="data.js"></script>
  <script src="ground_ambulance.js"></script>
  <script src="air_ambulance.js"></script>
  <script src="medical_escort.js"></script>
  <script src="worldwide_hq_overrides.js"></script>
  <script src="approved_categories.js"></script>
  <script src="approved_providers.js"></script>
  <script src="github_sync.js"></script>
  <script src="app.js"></script>
</body>
</html>
