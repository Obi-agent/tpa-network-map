<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Provider Submission Review</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="admin-page">
  <header class="admin-header">
    <div>
      <h1>Provider Submission Review</h1>
      <p id="adminStatus">Connect to GitHub to load pending submissions.</p>
    </div>
    <a class="map-link" href="index.html">Open map</a>
  </header>

  <main class="admin-shell">
    <section class="admin-panel auth-panel">
      <label class="form-field token-field">
        <span>GitHub token</span>
        <input id="githubToken" type="password" autocomplete="off" />
      </label>
      <div class="admin-actions">
        <button id="connectButton" type="button" class="primary-action">Connect</button>
        <button id="refreshButton" type="button" class="secondary-action">Refresh</button>
      </div>
    </section>

    <section class="queue-panel">
      <div class="queue-header">
        <h2>Pending submissions</h2>
        <span id="queueCount">0</span>
      </div>
      <div id="submissionList" class="submission-list"></div>
    </section>
  </main>

  <template id="emptyStateTemplate">
    <div class="empty-state">No pending submissions found.</div>
  </template>

  <script src="admin.js"></script>
</body>
</html>
