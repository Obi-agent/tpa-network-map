<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Provider Network Login</title>
  <link rel="stylesheet" href="styles.css?v=20260428-loginpoc" />
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-panel" aria-labelledby="loginTitle">
      <p class="login-kicker">Provider Network</p>
      <h1 id="loginTitle">Sign in</h1>
      <p class="login-copy">Use your approved email and password to continue.</p>
      <form id="loginForm" class="login-form" novalidate>
        <label class="form-field form-field-full">
          <span>Email</span>
          <input id="email" name="email" type="email" autocomplete="username" required />
        </label>
        <label class="form-field form-field-full">
          <span>Password</span>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </label>
        <p id="loginError" class="login-error" role="alert"></p>
        <button id="loginButton" type="submit" class="login-submit">Sign in</button>
      </form>
    </section>
  </main>
  <script src="sheets_config.js?v=20260428-loginpoc"></script>
  <script src="auth_client.js?v=20260428-loginpoc"></script>
  <script src="login.js?v=20260428-loginpoc"></script>
</body>
</html>
