<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Provider Network Password Hash Helper</title>
  <link rel="stylesheet" href="styles.css?v=20260428-loginpoc" />
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-panel hash-panel" aria-labelledby="hashTitle">
      <p class="login-kicker">Provider Network</p>
      <h1 id="hashTitle">Password hash helper</h1>
      <p class="login-copy">Generate the value to paste into the User Logins sheet. Nothing is sent to the server from this page.</p>
      <form id="hashForm" class="login-form" novalidate>
        <label class="form-field form-field-full">
          <span>Email</span>
          <input id="hashEmail" name="email" type="email" autocomplete="off" required />
        </label>
        <label class="form-field form-field-full">
          <span>Password</span>
          <input id="hashPassword" name="password" type="password" autocomplete="new-password" required />
        </label>
        <label class="form-field form-field-full">
          <span>Password hash</span>
          <textarea id="passwordHashOutput" rows="4" readonly></textarea>
        </label>
        <p id="hashError" class="login-error" role="alert"></p>
        <button id="hashButton" type="submit" class="login-submit">Generate hash</button>
      </form>
    </section>
  </main>
  <script src="sheets_config.js?v=20260428-loginpoc"></script>
  <script src="auth_client.js?v=20260428-loginpoc"></script>
  <script src="password_hash.js?v=20260428-loginpoc"></script>
</body>
</html>
