<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Provider Network Map</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <aside id="sidebar">
    <h2>Provider Network</h2>
    <p id="summaryText"></p>
    <div id="categoryFilters" class="filter-buttons category-buttons"></div>
    <div class="filter-buttons">
      <button id="filterAll" class="active">All</button>
      <button id="filterSigned">Signed</button>
      <button id="filterPending">Pending</button>
    </div>
    <div class="search-box">
      <input type="search" id="searchInput" placeholder="Search provider or location..." />
    </div>
    <ul id="providerList" class="provider-list"></ul>
  </aside>
  <div id="map"></div>
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="data.js"></script>
  <script src="ground_ambulance.js"></script>
  <script src="app.js"></script>
</body>
</html>
